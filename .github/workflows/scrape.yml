## STEP 6: Watch Your Action Run

1. In your repo, click the **"Actions"** tab at the top.
2. You should see a workflow run triggered by your commit. Click it.
3. Click into the **"scrape"** job, then expand the step with your email in the name.
4. You'll see output like:
```
   Sum for https://...seed=25: 12345.67
   ...
   Total sum across all pages: 99999.99
```

If it's not running, click **"Run workflow"** → **"Run workflow"** (green button).

