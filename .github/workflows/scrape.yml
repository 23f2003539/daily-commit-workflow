name: Scrape Table Sums 

on:
  push:                    # Runs every time you push code
  workflow_dispatch:       # Also lets you run it manually

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: 23f2003539@ds.study.iitm.ac.in - Run Playwright scraper
        run: node scrape.js
```

> ⚠️ **Important:** The step name `23f2003539@ds.study.iitm.ac.in - Run Playwright scraper` contains your email — this is **required** by the assignment so the grader can find it.

Click **"Commit new file"**.

