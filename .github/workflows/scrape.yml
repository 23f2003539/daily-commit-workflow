## STEP 7: Create a GitHub Personal Access Token (PAT)

The assignment needs your repo URL + a token so it can read your Action logs.

1. Go to [github.com/settings/tokens](https://github.com/settings/tokens)
2. Click **"Generate new token" → "Generate new token (classic)"**
3. Give it a name like `TDS Assignment`
4. Set expiration to **30 days**
5. Under **Scopes**, check:
   - ✅ `repo` (full control of private repositories)
   - ✅ `workflow`
6. Click **"Generate token"**
7. **Copy the token immediately** — you won't see it again!

